name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats e2fsprogs

      - name: Run ShellCheck
        run: |
          shellcheck --severity=style piko piko-lib piko-watchdog piko-browser-cycle piko-browser-guard install.sh uninstall.sh setup.sh

      - name: Run Bats Tests
        run: |
          bats tests/
